<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1e1e1e; color: #d4d4d4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px; line-height: 1.5; height: 100vh;
      display: flex; flex-direction: column;
    }

    /* status bar */
    #status {
      flex-shrink: 0; padding: 5px 12px; background: #007acc;
      color: #fff; font-size: 12px; display: flex; align-items: center; gap: 8px;
    }
    #status.error { background: #c0392b; }
    #status.disconnected { background: #444; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4fc1ff; flex-shrink: 0; }
    #status.disconnected #status-dot { background: #888; }
    #status.error #status-dot { background: #ff8a8a; }

    /* layout */
    #main { flex: 1; display: flex; min-height: 0; }

    /* file sidebar */
    #sidebar {
      width: 240px; flex-shrink: 0; background: #252526;
      border-right: 1px solid #3c3c3c; display: flex; flex-direction: column; overflow: hidden;
    }
    #sidebar-title {
      padding: 10px 12px; font-size: 11px; font-weight: 600; letter-spacing: .08em;
      color: #888; text-transform: uppercase; border-bottom: 1px solid #3c3c3c; flex-shrink: 0;
    }
    #drop-zone {
      margin: 10px; border: 2px dashed #3c3c3c; border-radius: 8px;
      padding: 18px 10px; text-align: center; cursor: pointer;
      transition: border-color .15s, background .15s; flex-shrink: 0;
    }
    #drop-zone:hover, #drop-zone.drag-over { border-color: #007acc; background: #1a2d3e; }
    #drop-zone svg { display: block; margin: 0 auto 6px; opacity: .5; }
    #drop-zone p { font-size: 12px; color: #888; line-height: 1.4; }
    #drop-zone strong { color: #ccc; }
    #file-input { display: none; }
    #upload-progress { margin: 0 10px 6px; font-size: 12px; color: #4fc1ff; display: none; }
    #uploads-label {
      padding: 5px 10px 3px; font-size: 11px; font-weight: 600;
      color: #555; text-transform: uppercase; letter-spacing: .06em; flex-shrink: 0;
    }
    #uploads-list { flex: 1; overflow-y: auto; padding: 0 6px 6px; }
    #uploads-list .empty { padding: 8px; font-size: 12px; color: #444; }
    .upload-item {
      background: #2d2d2d; border: 1px solid #3c3c3c; border-radius: 6px;
      padding: 8px 9px; margin-bottom: 5px; font-size: 12px;
    }
    .upload-item .fname { color: #ccc; font-weight: 500; margin-bottom: 2px; word-break: break-all; }
    .upload-item .fpath {
      color: #555; font-size: 11px; font-family: ui-monospace, Consolas, monospace;
      word-break: break-all; margin-bottom: 7px;
    }
    .upload-item .item-actions { display: flex; gap: 5px; flex-wrap: wrap; }
    .btn-sm {
      padding: 3px 7px; font-size: 11px; border: 1px solid #3c3c3c;
      background: #3c3c3c; color: #ccc; border-radius: 4px; cursor: pointer;
    }
    .btn-sm:hover { background: #4e4e4e; color: #fff; }
    .btn-sm.primary { background: #0e639c; border-color: #0e639c; color: #fff; }
    .btn-sm.primary:hover { background: #1177bb; }

    /* terminal */
    #terminal { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #history { flex: 1; overflow-y: auto; padding: 12px; min-height: 0; }
    #history .hint { color: #6e6e6e; font-size: 13px; margin-bottom: 12px; }
    #history .hint code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .msg-user { margin-bottom: 8px; }
    .msg-user .bubble {
      display: inline-block; max-width: 85%; padding: 8px 12px;
      background: #2d2d2d; border: 1px solid #3c3c3c; border-radius: 6px;
      color: #d4d4d4; white-space: pre-wrap; word-break: break-word;
    }
    .msg-event { margin-bottom: 6px; }
    .msg-event .bubble {
      display: inline-block; padding: 4px 10px;
      background: #2a2a1e; border: 1px solid #5a5a1e; border-radius: 4px;
      color: #e5c07b; font-size: 11px;
    }
    .msg-response { margin-bottom: 16px; }
    .msg-response .bubble {
      display: inline-block; max-width: 85%; padding: 8px 12px;
      background: #252526; border: 1px solid #3c3c3c; border-radius: 6px;
      color: #cccccc; white-space: pre-wrap; word-break: break-word;
      font-family: ui-monospace, Consolas, monospace; font-size: 13px;
    }
    .msg-response .stderr { color: #e06c75; margin-top: 4px; }
    .msg-response .download-hint {
      margin-top: 8px; padding-top: 8px; border-top: 1px solid #3c3c3c;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .msg-response .download-hint .dl-label { font-size: 11px; color: #666; font-family: inherit; }

    /* input area */
    #input-area {
      flex-shrink: 0; padding: 10px 12px;
      background: #252526; border-top: 1px solid #3c3c3c;
    }
    #input-row { display: flex; gap: 8px; align-items: flex-end; }
    #input {
      flex: 1; min-height: 44px; min-width: 120px; padding: 8px 10px;
      background: #3c3c3c; border: 1px solid #3c3c3c; border-radius: 6px;
      color: #d4d4d4; font: inherit; resize: both; outline: none;
    }
    #input:focus { border-color: #007acc; }
    #input::placeholder { color: #6e6e6e; }
    #send {
      padding: 10px 16px; background: #0e639c; color: #fff;
      border: none; border-radius: 6px; font: inherit; cursor: pointer; white-space: nowrap;
    }
    #send:hover { background: #1177bb; }
    #send:disabled { background: #3c3c3c; color: #6e6e6e; cursor: not-allowed; }
    .send-hint { margin-top: 5px; font-size: 11px; color: #555; }
  </style>
</head>
<body>

<div id="status" class="disconnected">
  <span id="status-dot"></span>
  <span id="status-text">Connecting…</span>
</div>

<div id="main">
  <!-- file sidebar -->
  <div id="sidebar">
    <div id="sidebar-title">Files</div>
    <div id="drop-zone" title="Click or drop a file to upload to /tmp/cliver/uploads/">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p><strong>Drop a file</strong> or click<br>to upload</p>
      <input type="file" id="file-input" multiple>
    </div>
    <div id="upload-progress">Uploading…</div>
    <div id="uploads-label">Uploaded files</div>
    <div id="uploads-list"><div class="empty">No uploads yet.</div></div>
  </div>

  <!-- terminal -->
  <div id="terminal">
    <div id="history">
      <div class="hint" id="help-hint">Loading commands…</div>
    </div>
    <div id="input-area">
      <div id="input-row">
        <textarea id="input" rows="2" placeholder="Type a command and press Shift+Enter to send…" aria-label="Command input"></textarea>
        <button id="send" type="button" disabled>Send</button>
      </div>
      <div class="send-hint">Shift+Enter to send &nbsp;·&nbsp; Enter for new line</div>
    </div>
  </div>
</div>

<script>
(function () {
  var params      = new URLSearchParams(location.search);
  var wsUrl       = params.get('ws') || 'ws://localhost:8765';
  var statusEl    = document.getElementById('status');
  var statusTxt   = document.getElementById('status-text');
  var historyEl   = document.getElementById('history');
  var inputEl     = document.getElementById('input');
  var sendBtn     = document.getElementById('send');
  var dropZone    = document.getElementById('drop-zone');
  var fileInput   = document.getElementById('file-input');
  var uploadsProg = document.getElementById('upload-progress');
  var uploadsList = document.getElementById('uploads-list');
  var helpHint    = document.getElementById('help-hint');

  var ws = null;
  var connected = false;
  var closedBySession = false;
  var currentResponseEl = null;
  var pendingHelpResponse = false;
  var pendingProtocol = []; // [{types, resolve}]

  // ── status ──────────────────────────────────────────────────────────
  function setStatus(msg, mode) {
    statusTxt.textContent = msg;
    statusEl.className = mode || '';
  }

  // ── history helpers ──────────────────────────────────────────────────
  function escHtml(s) {
    if (!s) return '';
    var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }
  function scrollBottom() { historyEl.scrollTop = historyEl.scrollHeight; }

  function appendUserMessage(text) {
    var wrap = document.createElement('div'); wrap.className = 'msg-user';
    var bubble = document.createElement('div'); bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble); historyEl.appendChild(wrap); scrollBottom();
  }

  function appendEvent(text) {
    var wrap = document.createElement('div'); wrap.className = 'msg-event';
    var bubble = document.createElement('div'); bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble); historyEl.appendChild(wrap); scrollBottom();
  }

  function ensureResponseBlock() {
    if (!currentResponseEl) {
      var wrap = document.createElement('div'); wrap.className = 'msg-response';
      var bubble = document.createElement('div'); bubble.className = 'bubble';
      wrap.appendChild(bubble); historyEl.appendChild(wrap);
      currentResponseEl = bubble;
    }
    return currentResponseEl;
  }

  // auto-detect /tmp/cliver/ paths in CLI output → offer download button
  var CLIVER_PATH_RE = /\/tmp\/cliver\/[^\s'"<>]+/g;

  function appendToResponse(stdout, stderr) {
    var bubble = ensureResponseBlock();
    if (stdout) {
      var sp = document.createElement('span'); sp.textContent = stdout; bubble.appendChild(sp);
    }
    if (stderr) {
      var err = document.createElement('div'); err.className = 'stderr';
      err.textContent = stderr; bubble.appendChild(err);
    }
    var paths = (stdout || '').match(CLIVER_PATH_RE);
    if (paths) {
      var hint = document.createElement('div'); hint.className = 'download-hint';
      var lbl = document.createElement('span'); lbl.className = 'dl-label';
      lbl.textContent = 'Download:'; hint.appendChild(lbl);
      paths.forEach(function (p) {
        var btn = document.createElement('button'); btn.className = 'btn-sm primary';
        btn.textContent = '⬇ ' + p.split('/').pop(); btn.title = p;
        btn.onclick = function () { triggerDownload(p); };
        hint.appendChild(btn);
      });
      bubble.appendChild(hint);
    }
    scrollBottom();
  }

  // ── WebSocket ────────────────────────────────────────────────────────
  function wsSend(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
  }

  function submitLine() {
    var text = inputEl.value.trim();
    if (!text) return;
    if (!connected || !ws || ws.readyState !== WebSocket.OPEN) {
      setStatus('Not connected. Refresh to reconnect.', 'error'); return;
    }
    appendUserMessage(text);
    inputEl.value = '';
    currentResponseEl = null;
    wsSend({ line: text });
  }

  sendBtn.addEventListener('click', submitLine);
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); submitLine(); }
  });

  function handleMessage(obj) {
    for (var i = 0; i < pendingProtocol.length; i++) {
      var cb = pendingProtocol[i];
      if (cb.types.indexOf(obj.type) !== -1) {
        pendingProtocol.splice(i, 1); cb.resolve(obj); return;
      }
    }
    if (pendingHelpResponse) {
      pendingHelpResponse = false;
      var raw = (obj.stdout || '').replace(/\s*cjpm run finished\s*/gi, '').trim();
      if (!raw && obj.stderr) raw = obj.stderr.trim();
      if (raw) {
        var escaped = escHtml(raw).replace(/\n/g, '<br>');
        escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
        var parts = escaped.split(/(<code>[\s\S]*?<\/code>)/g);
        for (var j = 0; j < parts.length; j++) {
          if (parts[j].indexOf('<code>') !== 0)
            parts[j] = parts[j].replace(/_([^_]+)_/g, '<em>$1</em>');
        }
        helpHint.innerHTML = parts.join('');
      } else { helpHint.innerHTML = 'Help not available.'; }
      return;
    }
    if (obj.sessionClosed) {
      if (obj.stdout) appendToResponse(obj.stdout, '');
      setStatus('Session closed.', 'disconnected');
      closedBySession = true;
      try { ws.close(); } catch (_) {}
      return;
    }
    appendToResponse(obj.stdout || '', obj.stderr || '');
  }

  function connect() {
    setStatus('Connecting to ' + wsUrl + '…', 'disconnected');
    try {
      ws = new WebSocket(wsUrl);
      ws.onopen = function () {
        connected = true;
        setStatus('Connected. Type a command (e.g. Student new Alice 1001) or VAR = command for env vars.', '');
        sendBtn.disabled = false; inputEl.focus();
        pendingHelpResponse = true;
        ws.send(JSON.stringify({ line: 'help' }));
      };
      ws.onclose = function () {
        connected = false; sendBtn.disabled = true;
        if (closedBySession) { setStatus('Session closed.'); }
        else { setStatus('Disconnected. Start: node web/cli_ws_server.js', 'error'); }
      };
      ws.onerror = function () {
        setStatus('Cannot connect to ' + wsUrl + '. Run: node web/cli_ws_server.js', 'error');
      };
      ws.onmessage = function (ev) {
        try { handleMessage(JSON.parse(ev.data)); } catch (_) {
          historyEl.appendChild(document.createTextNode(ev.data)); scrollBottom();
        }
      };
    } catch (e) { setStatus('Error: ' + e.message, 'error'); }
  }

  // ── upload ───────────────────────────────────────────────────────────
  function uploadFile(file) {
    uploadsProg.style.display = 'block';
    uploadsProg.textContent = 'Uploading ' + file.name + '…';
    var reader = new FileReader();
    reader.onload = function (e) {
      var b64 = e.target.result.split(',')[1];
      var promise = new Promise(function (resolve) {
        pendingProtocol.push({ types: ['upload_result', 'upload_error'], resolve: resolve });
      });
      wsSend({ type: 'upload', filename: file.name, data: b64 });
      promise.then(function (resp) {
        uploadsProg.style.display = 'none';
        if (resp.type === 'upload_result') {
          addUploadedItem(file.name, resp.path, resp.handle);
          var ref = resp.handle ? '$' + resp.handle : resp.path;
          appendEvent('✓ Uploaded ' + file.name + ' → ' + ref + ' (' + resp.path + ')');
        } else {
          appendEvent('✗ Upload failed: ' + (resp.message || 'unknown error'));
        }
      });
    };
    reader.readAsDataURL(file);
  }

  function addUploadedItem(fname, fpath, handle) {
    var ph = uploadsList.querySelector('.empty');
    if (ph) ph.remove();

    var item = document.createElement('div'); item.className = 'upload-item';

    var fnDiv = document.createElement('div'); fnDiv.className = 'fname';
    fnDiv.textContent = fname; item.appendChild(fnDiv);

    var fpDiv = document.createElement('div'); fpDiv.className = 'fpath';
    fpDiv.textContent = handle ? '$' + handle : fpath; item.appendChild(fpDiv);

    var actions = document.createElement('div'); actions.className = 'item-actions';

    var insertRef = handle ? '$' + handle : fpath;

    var copyBtn = document.createElement('button'); copyBtn.className = 'btn-sm';
    copyBtn.textContent = 'Copy';
    copyBtn.title = 'Copy ' + insertRef;
    copyBtn.onclick = function () {
      navigator.clipboard.writeText(insertRef).then(function () {
        copyBtn.textContent = 'Copied!';
        setTimeout(function () { copyBtn.textContent = 'Copy'; }, 1500);
      });
    };
    actions.appendChild(copyBtn);

    var insertBtn = document.createElement('button'); insertBtn.className = 'btn-sm primary';
    insertBtn.textContent = 'Insert';
    insertBtn.title = 'Insert ' + insertRef + ' at cursor';
    insertBtn.onclick = function () {
      var cur = inputEl.value;
      var sel = inputEl.selectionStart || cur.length;
      inputEl.value = cur.slice(0, sel) + insertRef + cur.slice(sel);
      inputEl.focus();
      inputEl.setSelectionRange(sel + insertRef.length, sel + insertRef.length);
    };
    actions.appendChild(insertBtn);

    var dlBtn = document.createElement('button'); dlBtn.className = 'btn-sm';
    dlBtn.textContent = '⬇'; dlBtn.title = 'Download ' + fpath;
    dlBtn.onclick = function () { triggerDownload(fpath); };
    actions.appendChild(dlBtn);

    item.appendChild(actions);
    uploadsList.insertBefore(item, uploadsList.firstChild);
  }

  dropZone.addEventListener('click', function () { fileInput.click(); });
  fileInput.addEventListener('change', function () {
    Array.from(fileInput.files).forEach(uploadFile); fileInput.value = '';
  });
  dropZone.addEventListener('dragover', function (e) {
    e.preventDefault(); dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('drag-over'); });
  dropZone.addEventListener('drop', function (e) {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    Array.from(e.dataTransfer.files).forEach(uploadFile);
  });

  // ── download ─────────────────────────────────────────────────────────
  function triggerDownload(serverPath) {
    var promise = new Promise(function (resolve) {
      pendingProtocol.push({ types: ['download_result', 'download_error'], resolve: resolve });
    });
    wsSend({ type: 'download', path: serverPath });
    promise.then(function (resp) {
      if (resp.type === 'download_result') {
        var bytes = Uint8Array.from(atob(resp.data), function (c) { return c.charCodeAt(0); });
        var blob = new Blob([bytes]);
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = resp.filename || serverPath.split('/').pop();
        document.body.appendChild(a); a.click();
        setTimeout(function () { URL.revokeObjectURL(url); a.remove(); }, 1000);
        appendEvent('⬇ Downloaded ' + resp.filename + ' (' + bytes.length + ' bytes)');
      } else {
        appendEvent('✗ Download failed: ' + (resp.message || 'unknown error'));
      }
    });
  }

  connect();
  inputEl.focus();
})();
</script>
</body>
</html>
